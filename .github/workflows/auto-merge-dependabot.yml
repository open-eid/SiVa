name: Auto-merge Dependabot PRs

on:
  pull_request_target:
    branches:
      - master-dependency-update
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Additional safeguard: hard-pin this workflow to this repository only.
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository && github.repository == 'open-eid/SiVa' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Ensure only pom.xml files are changed
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            );

            const disallowed = files
              .map((f) => f.filename)
              .filter((path) => !path.endsWith('/pom.xml') && path !== 'pom.xml');

            if (disallowed.length > 0) {
              core.setFailed(`PR contains non-pom.xml changes: ${disallowed.join(', ')}`);
            }

      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge Dependabot PR (squash)
        # Additional safeguard: block major updates here too, even though dependabot.yml already ignores them.
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const maxAttempts = 3;
            const waitMs = 15000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number
              });

              if (pr.state !== 'open') {
                return;
              }

              if (pr.mergeable === true) {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number,
                  merge_method: 'squash',
                  sha: pr.head.sha
                });
                return;
              }

              if (attempt < maxAttempts) {
                await new Promise((resolve) => setTimeout(resolve, waitMs));
              }
            }

            core.setFailed(`PR #${pull_number} was not mergeable after ${maxAttempts} attempts.`);
